<style>
/* ============================================================
   Ziwei Fan — Homepage design system
   Overrides the minimal-mistakes defaults with a modern
   academic look while keeping the theme's structure intact.
   ============================================================ */

:root {
  /* Palette: Clay & Kraft (桑榆) — walnut umber on kraft cream */
  --zf-bg: #f8f4ec;
  --zf-surface: #fffdf9;
  --zf-surface-2: #f0e9dc;
  --zf-ink: #231b12;
  --zf-ink-soft: #4a3f31;
  --zf-ink-muted: #7a6b57;
  --zf-line: #e4dbc9;
  --zf-accent: #8a5a2b;
  --zf-accent-dark: #6b4520;
  --zf-accent-2: #b8865b;
  --zf-accent-soft: #efe3d1;
  --zf-highlight: #c98a3a;
  --zf-radius: 14px;
  --zf-radius-sm: 8px;
  --zf-shadow: 0 1px 2px rgba(20, 25, 40, 0.04), 0 8px 24px rgba(20, 25, 40, 0.06);
  --zf-shadow-hover: 0 4px 8px rgba(20, 25, 40, 0.06), 0 18px 40px rgba(20, 25, 40, 0.10);
}

html { scroll-behavior: smooth; }

body,
.page__content,
.author__name,
.author__bio,
.masthead,
.greedy-nav,
.archive__item-title,
h1, h2, h3, h4, h5, h6 {
  font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  background: var(--zf-bg);
  color: var(--zf-ink);
  letter-spacing: -0.005em;
}

.page__content { font-size: 16px; line-height: 1.7; color: var(--zf-ink); }
.page__content p { color: var(--zf-ink-soft); }

/* ---- Masthead / nav ---------------------------------------- */
.masthead {
  background: rgba(251, 250, 247, 0.85);
  backdrop-filter: saturate(160%) blur(10px);
  -webkit-backdrop-filter: saturate(160%) blur(10px);
  border-bottom: 1px solid var(--zf-line);
  position: sticky;
  top: 0;
  z-index: 40;
}
.masthead__inner-wrap { padding: 0.9em 1.25em; }
.greedy-nav { background: transparent; }
.greedy-nav a {
  color: var(--zf-ink);
  font-weight: 500;
  font-size: 0.95rem;
  padding: 0.55em 0.9em;
  border-radius: 999px;
  transition: color .15s ease, background .15s ease;
}
.greedy-nav a:hover { color: var(--zf-accent); background: var(--zf-accent-soft); }
.greedy-nav .masthead__menu-item--lg a {
  font-family: "Fraunces", "Inter", serif;
  font-weight: 600;
  letter-spacing: -0.01em;
  background: transparent;
}
.greedy-nav .masthead__menu-item--lg a:hover { background: transparent; color: var(--zf-accent); }

/* Hide sidebar/author card on homepage — hero replaces it */
.zf-single-page #main > .sidebar { display: none !important; }
.zf-single-page #main > .archive {
  float: none;
  width: 100%;
  max-width: 1080px;
  margin: 0 auto;
  padding-right: 1em;
  padding-left: 1em;
}
.zf-single-page .archive .page__title { display: none; }
.zf-single-page .page__footer { background: var(--zf-surface-2); }
.zf-single-page .page__footer p,
.zf-single-page .page__footer a { color: var(--zf-ink-muted); }

/* ---- Hero -------------------------------------------------- */
.zf-hero {
  position: relative;
  margin: 2rem 0 3.25rem;
  padding: 3rem 2.4rem;
  background:
    radial-gradient(1200px 400px at -10% -30%, rgba(31, 75, 110, 0.09), transparent 60%),
    radial-gradient(900px 300px at 110% -20%, rgba(184, 134, 91, 0.10), transparent 55%),
    linear-gradient(180deg, #ffffff, #fbfaf7);
  border: 1px solid var(--zf-line);
  border-radius: 22px;
  box-shadow: var(--zf-shadow);
  overflow: hidden;
}
.zf-hero::after {
  content: "";
  position: absolute; inset: 0;
  pointer-events: none;
  background-image:
    radial-gradient(rgba(20,25,40,0.05) 1px, transparent 1px);
  background-size: 22px 22px;
  mask-image: linear-gradient(180deg, rgba(0,0,0,0.35), transparent 70%);
  -webkit-mask-image: linear-gradient(180deg, rgba(0,0,0,0.35), transparent 70%);
  opacity: 0.45;
}
.zf-hero__grid {
  position: relative;
  display: grid;
  grid-template-columns: 200px 1fr;
  gap: 2.25rem;
  align-items: center;
}
.zf-hero__portrait {
  position: relative;
  width: 200px; height: 200px;
  border-radius: 50%;
  overflow: hidden;
  box-shadow: 0 0 0 4px #fff, 0 0 0 5px var(--zf-line), var(--zf-shadow);
}
.zf-hero__portrait img { width: 100%; height: 100%; object-fit: cover; display: block; }
.zf-hero__eyebrow {
  display: inline-flex; align-items: center; gap: .5rem;
  font-size: .78rem; font-weight: 600; letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--zf-accent);
  background: var(--zf-accent-soft);
  padding: .35rem .7rem;
  border-radius: 999px;
  margin-bottom: 1rem;
}
.zf-hero__eyebrow .dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #22c55e;
  box-shadow: 0 0 0 3px rgba(34,197,94,0.18);
}
.zf-hero__name {
  font-family: "Fraunces", "Inter", serif;
  font-weight: 600;
  font-size: clamp(2.2rem, 4.4vw, 3.2rem);
  line-height: 1.05;
  letter-spacing: -0.025em;
  color: var(--zf-ink);
  margin: 0 0 .5rem;
}
.zf-hero__role {
  font-size: 1.08rem;
  color: var(--zf-ink-soft);
  margin: 0 0 1.1rem;
}
.zf-hero__role .zf-org {
  color: var(--zf-ink);
  font-weight: 600;
  border-bottom: 2px solid var(--zf-accent-2);
  padding-bottom: 1px;
}
.zf-hero__blurb {
  color: var(--zf-ink-soft);
  font-size: 1rem;
  max-width: 640px;
  margin: 0 0 1.5rem;
}
.zf-hero__actions {
  display: flex; flex-wrap: wrap; gap: .55rem 1.4rem;
  align-items: center;
}
.zf-btn {
  display: inline-flex; align-items: center; gap: .5rem;
  padding: .6rem 1rem;
  border-radius: 999px;
  font-size: .92rem;
  font-weight: 600;
  text-decoration: none !important;
  border: 1px solid transparent;
  transition: transform .15s ease, background .15s ease, box-shadow .15s ease, color .15s ease;
}
.zf-btn--primary { background: var(--zf-accent); color: #fff !important; }
.zf-btn--primary:hover { background: var(--zf-accent-dark); transform: translateY(-1px); box-shadow: var(--zf-shadow); }
.zf-btn--ghost {
  background: #fff; color: var(--zf-ink) !important;
  border-color: var(--zf-line);
}
.zf-btn--ghost:hover { border-color: var(--zf-accent); color: var(--zf-accent) !important; }
.zf-social {
  display: inline-flex; gap: .35rem; align-items: center;
}
.zf-social a {
  width: 38px; height: 38px;
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--zf-ink-soft) !important;
  border: 1px solid var(--zf-line);
  border-radius: 50%;
  background: #fff;
  transition: color .15s ease, border-color .15s ease, transform .15s ease;
  text-decoration: none !important;
}
.zf-social a:hover { color: var(--zf-accent) !important; border-color: var(--zf-accent); transform: translateY(-1px); }
.zf-social a i { font-size: 1rem; }

/* ---- Section shell ---------------------------------------- */
.zf-section { scroll-margin-top: 90px; margin: 4rem 0; }
.zf-section__head {
  display: flex; align-items: baseline; justify-content: space-between;
  gap: 1rem; margin-bottom: 1.5rem;
  border-bottom: 1px solid var(--zf-line);
  padding-bottom: .75rem;
}
.zf-section__title {
  font-family: "Fraunces", "Inter", serif;
  font-weight: 600;
  font-size: 1.75rem;
  letter-spacing: -0.02em;
  color: var(--zf-ink);
  margin: 0;
  display: inline-flex; align-items: center; gap: .65rem;
}
.zf-section__title .num {
  font-family: "JetBrains Mono", monospace;
  font-size: .8rem;
  font-weight: 500;
  color: var(--zf-accent-2);
  letter-spacing: .05em;
}
.zf-section__link {
  font-size: .9rem; font-weight: 500;
  color: var(--zf-ink-muted) !important;
  text-decoration: none !important;
}
.zf-section__link:hover { color: var(--zf-accent) !important; }

/* ---- About / research interests --------------------------- */
.zf-prose p { color: var(--zf-ink-soft); font-size: 1rem; line-height: 1.75; }
.zf-prose strong { color: var(--zf-ink); font-weight: 600; }
.zf-highlights { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1rem; margin-top: 1.6rem; }
.zf-highlight-card {
  background: var(--zf-surface);
  border: 1px solid var(--zf-line);
  border-radius: var(--zf-radius);
  padding: 1.2rem 1.15rem;
  transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease;
}
.zf-highlight-card:hover { transform: translateY(-2px); box-shadow: var(--zf-shadow); border-color: #d7d1c2; }
.zf-highlight-card .icon {
  width: 34px; height: 34px; border-radius: 10px;
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--zf-accent-soft); color: var(--zf-accent);
  margin-bottom: .7rem;
  font-size: 1rem;
}
.zf-highlight-card h4 { margin: 0 0 .35rem; font-size: 1rem; color: var(--zf-ink); font-weight: 600; }
.zf-highlight-card p { margin: 0; font-size: .9rem; color: var(--zf-ink-muted); line-height: 1.55; }

/* ---- News ------------------------------------------------- */
.zf-news {
  background: var(--zf-surface);
  border: 1px solid var(--zf-line);
  border-radius: var(--zf-radius);
  padding: .4rem 1.3rem;
  max-height: 320px;
  overflow-y: auto;
}
.zf-news__item {
  display: grid;
  grid-template-columns: 110px 1fr;
  gap: 1rem;
  padding: .95rem 0;
  border-bottom: 1px dashed var(--zf-line);
}
.zf-news__item:last-child { border-bottom: none; }
.zf-news__date {
  font-family: "JetBrains Mono", monospace;
  font-size: .78rem;
  color: var(--zf-accent-2);
  letter-spacing: .04em;
  padding-top: .1rem;
  font-weight: 500;
}
.zf-news__text { color: var(--zf-ink-soft); font-size: .95rem; line-height: 1.6; }
.zf-news__text strong { color: var(--zf-ink); font-weight: 600; }
.zf-news__text a { color: var(--zf-accent); text-decoration: none; border-bottom: 1px solid rgba(31,75,110,.25); }
.zf-news__text a:hover { border-bottom-color: var(--zf-accent); }

/* ---- Publications ----------------------------------------- */
.zf-pub-list { display: flex; flex-direction: column; gap: 1rem; }
.zf-pub {
  display: grid;
  grid-template-columns: 100px 1fr;
  gap: 1.25rem;
  align-items: start;
  background: var(--zf-surface);
  border: 1px solid var(--zf-line);
  border-radius: var(--zf-radius);
  padding: 1.15rem 1.25rem;
  transition: box-shadow .2s ease, transform .2s ease, border-color .2s ease;
}
.zf-pub:hover { box-shadow: var(--zf-shadow-hover); transform: translateY(-1px); border-color: #d7d1c2; }
.zf-venue {
  display: inline-flex; flex-direction: column; align-items: center; justify-content: center;
  text-align: center;
  padding: .55rem .55rem;
  border-radius: 10px;
  background: linear-gradient(180deg, var(--zf-accent-soft), #fff);
  border: 1px solid #d9e4ee;
  min-height: 62px;
}
.zf-venue .name {
  font-family: "JetBrains Mono", monospace;
  font-size: .82rem;
  font-weight: 600;
  color: var(--zf-accent);
  letter-spacing: .02em;
  line-height: 1.1;
}
.zf-venue .year { font-size: .72rem; color: var(--zf-ink-muted); margin-top: .18rem; }
.zf-venue.zf-venue--arxiv { background: linear-gradient(180deg, #fdf1e3, #fff); border-color: #f0d5b4; }
.zf-venue.zf-venue--arxiv .name { color: #a05a1a; }
.zf-venue.zf-venue--award { background: linear-gradient(180deg, #fff2c8, #fff); border-color: #f0dc90; }
.zf-venue.zf-venue--award .name { color: #7a5a00; }
.zf-venue.zf-venue--report { background: linear-gradient(180deg, #efe3d1, #fff); border-color: #e0cba6; }
.zf-venue.zf-venue--report .name { color: #6b4520; font-size: .72rem; line-height: 1.15; }
.zf-pub__title { font-size: 1.02rem; font-weight: 600; color: var(--zf-ink); line-height: 1.4; margin: 0 0 .35rem; }
.zf-pub__authors { font-size: .92rem; color: var(--zf-ink-soft); margin: 0 0 .5rem; line-height: 1.55; }
.zf-pub__authors .me { color: var(--zf-ink); font-weight: 600; border-bottom: 2px solid var(--zf-accent-2); padding-bottom: 1px; }
.zf-pub__meta {
  display: flex; flex-wrap: wrap; gap: .4rem .5rem; align-items: center;
  font-size: .82rem;
}
.zf-tag {
  display: inline-flex; align-items: center; gap: .3rem;
  padding: .18rem .55rem;
  border-radius: 999px;
  background: var(--zf-surface-2);
  color: var(--zf-ink-soft);
  border: 1px solid var(--zf-line);
  font-weight: 500;
  text-decoration: none !important;
}
.zf-tag--award { background: #fff2c8; color: #7a5a00; border-color: #f0dc90; }
.zf-tag--link { background: #fff; }
.zf-tag--link:hover { color: var(--zf-accent); border-color: var(--zf-accent); }
.zf-tag i { font-size: .75rem; }

/* ---- Timeline (Experience) -------------------------------- */
.zf-timeline { position: relative; padding-left: 1.75rem; }
.zf-timeline::before {
  content: ""; position: absolute; left: 7px; top: 6px; bottom: 6px;
  width: 2px;
  background: linear-gradient(180deg, var(--zf-accent), var(--zf-accent-2));
  border-radius: 2px;
  opacity: .35;
}
.zf-tl-item { position: relative; margin-bottom: 1.75rem; padding-left: .5rem; }
.zf-tl-item::before {
  content: ""; position: absolute;
  left: -1.75rem; top: .55rem;
  width: 16px; height: 16px;
  border-radius: 50%;
  background: #fff;
  border: 3px solid var(--zf-accent);
  box-shadow: 0 0 0 3px var(--zf-bg);
}
.zf-tl-item.current::before { border-color: #22c55e; box-shadow: 0 0 0 3px var(--zf-bg), 0 0 0 6px rgba(34,197,94,.18); }
.zf-tl-when {
  font-family: "JetBrains Mono", monospace;
  font-size: .78rem;
  color: var(--zf-accent-2);
  font-weight: 500;
  letter-spacing: .03em;
  margin-bottom: .25rem;
}
.zf-tl-role { font-size: 1.02rem; font-weight: 600; color: var(--zf-ink); margin: 0 0 .12rem; }
.zf-tl-org { font-size: .95rem; color: var(--zf-ink-soft); margin: 0 0 .6rem; }
.zf-tl-org .zf-org-name { color: var(--zf-accent); font-weight: 600; }
.zf-tl-item ul { margin: .5rem 0 0; padding-left: 1.15rem; }
.zf-tl-item ul li { font-size: .93rem; color: var(--zf-ink-soft); margin-bottom: .3rem; line-height: 1.55; }
.zf-tl-item ul li strong { color: var(--zf-ink); font-weight: 600; }
.zf-cites { display: inline; }
.zf-cite {
  display: inline-block;
  font-family: "JetBrains Mono", monospace;
  font-size: .66rem;
  font-weight: 500;
  letter-spacing: .01em;
  color: var(--zf-accent);
  background: var(--zf-accent-soft);
  border: 1px solid var(--zf-line);
  border-radius: 5px;
  padding: .04rem .38rem;
  margin: 0 0 .1rem .28rem;
  vertical-align: 1px;
  white-space: nowrap;
}

/* ---- Education cards -------------------------------------- */
.zf-edu { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1rem; }
.zf-edu-card {
  background: var(--zf-surface);
  border: 1px solid var(--zf-line);
  border-radius: var(--zf-radius);
  padding: 1.25rem 1.2rem;
  transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease;
}
.zf-edu-card:hover { transform: translateY(-2px); box-shadow: var(--zf-shadow); border-color: #d7d1c2; }
.zf-edu-card .degree { font-size: 1.02rem; font-weight: 600; color: var(--zf-ink); margin: 0 0 .3rem; }
.zf-edu-card .school { color: var(--zf-accent); font-weight: 500; font-size: .95rem; margin: 0 0 .35rem; }
.zf-edu-card .when {
  font-family: "JetBrains Mono", monospace;
  font-size: .78rem;
  color: var(--zf-ink-muted);
  letter-spacing: .04em;
}
.zf-edu-card .thesis {
  margin-top: .6rem; font-size: .88rem; color: var(--zf-ink-soft);
  border-top: 1px dashed var(--zf-line); padding-top: .55rem;
}

/* ---- Contact / footer note -------------------------------- */
.zf-contact {
  background: linear-gradient(135deg, var(--zf-accent) 0%, var(--zf-accent-dark) 100%);
  color: #fff;
  border-radius: 22px;
  padding: 2.5rem 2rem;
  text-align: center;
  margin: 4rem 0 3rem;
  box-shadow: var(--zf-shadow);
}
.zf-contact h2 {
  font-family: "Fraunces", "Inter", serif;
  color: #fff; margin: 0 0 .5rem;
  font-weight: 600;
  font-size: 1.9rem;
  letter-spacing: -0.02em;
}
.zf-contact p { color: rgba(255,255,255,.85); max-width: 560px; margin: 0 auto 1.5rem; font-size: 1rem; }
.zf-contact .zf-btn--primary { background: #fff; color: var(--zf-accent) !important; }
.zf-contact .zf-btn--primary:hover { background: var(--zf-highlight); color: var(--zf-accent) !important; }
.zf-contact .zf-btn--ghost { background: transparent; color: #fff !important; border-color: rgba(255,255,255,.4); }
.zf-contact .zf-btn--ghost:hover { border-color: #fff; }

/* ---- Responsive ------------------------------------------- */
@media (max-width: 720px) {
  .zf-hero { padding: 2rem 1.4rem; }
